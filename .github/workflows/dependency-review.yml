name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Licences copyleft — bloque la PR si une nouvelle dépendance en porte une
          deny-licenses: >-
            GPL-1.0, GPL-2.0, GPL-2.0-only, GPL-2.0-or-later,
            GPL-3.0, GPL-3.0-only, GPL-3.0-or-later,
            LGPL-2.0, LGPL-2.0-only, LGPL-2.0-or-later,
            LGPL-2.1, LGPL-2.1-only, LGPL-2.1-or-later,
            LGPL-3.0, LGPL-3.0-only, LGPL-3.0-or-later,
            AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later,
            EUPL-1.0, EUPL-1.1, EUPL-1.2,
            OSL-1.0, OSL-2.0, OSL-2.1, OSL-3.0
          # Commente automatiquement la PR avec les changements de dépendances
          comment-summary-in-pr: always
          # Bloque aussi les dépendances avec des vulnérabilités critiques
          fail-on-severity: critical
