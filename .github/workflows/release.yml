name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Generate test signing key
        run: python3 -m trust_layer.crypto

      - name: Run tests
        run: pytest tests/ -v

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-creatordate | head -2 | tail -1)
          echo "tag=${PREV:-$(git rev-list --max-parents=0 HEAD)}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          {
            echo "changelog<<EOF"
            git log "${{ steps.prev_tag.outputs.tag }}..HEAD" --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update CHANGELOG.md
        run: |
          python3 scripts/update_changelog.py \
            "${{ github.ref_name }}" \
            "${{ steps.prev_tag.outputs.tag }}"

      - name: Commit CHANGELOG.md via API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No CHANGELOG changes, skipping commit"
            exit 0
          fi
          CONTENT=$(base64 -w0 CHANGELOG.md)
          SHA=$(gh api repos/${{ github.repository }}/contents/CHANGELOG.md --jq '.sha')
          gh api repos/${{ github.repository }}/contents/CHANGELOG.md \
            -X PUT \
            -f message="docs(changelog): ${{ github.ref_name }} [skip ci]" \
            -f content="$CONTENT" \
            -f sha="$SHA" \
            -f branch="main"
          echo "CHANGELOG.md committed to main via GitHub API"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ---
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full history.
          generate_release_notes: false
